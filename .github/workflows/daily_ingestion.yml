name: Daily Data Ingestion Pipeline

on:
  schedule:
    # Runs at 04:30 UTC every day (10:00 AM IST)
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ingest-and-update:
    runs-on: ubuntu-latest
    
    env:
      PYTHONPATH: .
      
    # Required permissions to commit back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Collectors
        run: |
          python src/collectors/appstore_collector.py || echo "App Store collector failed, continuing..."
          python src/collectors/playstore_collector.py || echo "Play Store collector failed, continuing..."
          python src/collectors/reddit_collector.py || echo "Reddit collector failed, continuing..."
          python src/collectors/forums_collector.py || echo "Forums collector failed, continuing..."

      - name: Normalize Data
        run: |
          python src/utils/normalizer.py

      - name: Run LLM Enrichment Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python src/enrichment/enrichment_runner.py

      - name: Rebuild Vector Store (ChromaDB)
        run: |
          rm -rf data/chroma_db
          python src/storage/vector_store.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): auto-update reviews and rebuild vector store [skip ci]"
          file_pattern: "data/processed/*.json data/chroma_db/*"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"
